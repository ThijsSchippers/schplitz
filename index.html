        <h1>Schplitz — Privacy-First Expense Splitting</h1>
        <p>Split expenses with your partner or travel companion. No account, no server, no cloud. Your data is encrypted with AES-256-GCM and stays on your device.</p>

        <h2>How it works</h2>
        <ol>
          <li><strong>Set a shared secret</strong> — Pick a security question only you two would know. The answer is the encryption key; we never see it.</li>
          <li><strong>Log your expenses</strong> — Add what you spent. Everything stays on your device. Nothing is transmitted without your action.</li>
          <li><strong>Share an encrypted link</strong> — Your expenses are encrypted before they touch the URL. The other person decrypts with the same answer.</li>
          <li><strong>See who owes what</strong> — Schplitz calculates the balance across currencies at the historical exchange rate. No account required.</li>
        </ol>

        <h2>Technical specification</h2>
        <ul>
          <li>Cipher: AES-256-GCM</li>
          <li>Key derivation: PBKDF2-SHA256, 200,000 iterations</li>
          <li>Salt: 128-bit random per session</li>
          <li>Storage: localStorage, client-side only</li>
          <li>Network: none (optional currency API only)</li>
          <li>Server: none</li>
          <li>Telemetry: none</li>
          <li>Account required: no</li>
        </ul>

        <p>Open Schplitz: <a href="https://schplitz.vercel.app/">schplitz.vercel.app</a></p>
